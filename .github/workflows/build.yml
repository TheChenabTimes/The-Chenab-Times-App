name: Build Android Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"

      - name: Decode google-services.json
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Verify google-services package names
        run: |
          grep -n '"package_name"' android/app/google-services.json
          grep -q '"package_name": "com.thechenabtimes.app"' android/app/google-services.json

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/chenab-times.keystore
      - name: Verify keystore SHA-256
        run: |
          keytool -list -v \
            -keystore android/app/chenab-times.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" | grep "SHA256:"
      - name: Create key.properties
        run: |
          cat > android/key.properties << 'KEYEOF'
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=chenab-times.keystore
          KEYEOF

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Prepare AAB for Hostinger upload
        run: |
          mkdir -p release-upload
          cp build/app/outputs/bundle/release/app-release.aab release-upload/app-release.aab

      - name: Upload AAB to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: ${{ secrets.HOSTINGER_FTP_PORT || 21 }}
          protocol: ftp
          local-dir: release-upload/
          server-dir: public_html/downloads/imp/
