name: the_chenab_times
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Added this per your requirement
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  dart_rss: ^3.0.3
  webview_flutter: ^4.13.1
  webview_flutter_web: ^0.2.2+4
  html: ^0.15.4
  flutter_html: ^3.0.0-beta.2
  intl: 0.20.2
  lottie: ^3.3.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  flutter_launcher_icons: ^0.14.4
  permission_handler: ^12.0.1
  crypto: ^3.0.3
  file_picker: ^10.3.8
  share_plus: ^12.0.1
  youtube_player_flutter: ^9.0.1
  video_player: ^2.9.1
  screenshot: ^3.0.0
  image_picker: ^1.1.2
  razorpay_flutter: ^1.3.9
  firebase_core: ^4.3.0
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0
  googleapis_auth: ^2.0.0
  path: any
  provider: ^6.1.5+1
  fluttertoast: ^8.2.6
  image: ^4.2.0
  swipeable_button_view: 0.0.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# This section fixes the conflict between dart_rss and flutter_localizations
dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true
  assets:
    - lib/images/
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/images/appIco.png"
  min_sdk_android: 21
